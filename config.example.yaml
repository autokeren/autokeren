auth:
  mode: "platform"                    # "platform" (default, pakai developers.autokeren.com) atau "direct"
  api_key: ""                         # ak_live_... dari developers.autokeren.com (atau set AK_API_KEY env)
  base_url: "https://api.developers.autokeren.com"

cloudflare:
  account_id: ""          # Hanya untuk mode "direct" (atau set CLOUDFLARE_ACCOUNT_ID env var)
  api_token: ""           # Hanya untuk mode "direct" (atau set CLOUDFLARE_API_TOKEN env var)
  # Platform mode: pakai alias dari /v1/models (kimi-2.6, llama-3.3-70b, deepseek-r1, dll)
  # Direct mode: pakai @cf/... IDs
  # @cf/... IDs otomatis di-map ke platform alias di platform mode
  primary_model: "kimi-2.6"              # platform: kimi-2.6 | direct: @cf/moonshotai/kimi-k2.7-code
  secondary_model: "llama-3.3-70b"       # platform: llama-3.3-70b | direct: @cf/zai-org/glm-5.2
  max_tokens: 4096
  temperature: 0.3
  timeout: 120.0

retry:
  max_retries: 5
  base_delay: 1.0
  max_delay: 60.0
  exponential_base: 2.0
  jitter: true
  circuit_failure_threshold: 5
  circuit_open_seconds: 30

autokeren:
  plan_mode: false
  max_iterations: 25
  shell_timeout: 180
  shell_allowlist: []          # kosong = izinkan semua (dangerous commands tetap diblokir). atau set list misal ["git","npm"]
  project_root: "."
  context_window: 262144      # max token context window model
  compact_tail_turns: 6       # pesan terakhir yang dipertahankan saat /compact
  auto_compact: false         # auto-compact saat threshold tercapai
  auto_compact_threshold: 0.8 # compact di 80% usage
  max_tool_calls: 0           # 0 = unlimited (batas alami: context window + neuron quota)
